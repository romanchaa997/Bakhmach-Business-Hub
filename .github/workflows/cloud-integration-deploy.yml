name: Cloud Services Integration & Deployment

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  aws-deploy:
    name: Deploy to AWS S3 & CloudFront
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            frontend
            docs
          sparse-checkout-cone-mode: false
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        continue-on-error: true
      - name: Sync docs to S3
        run: aws s3 sync ./docs s3://bakhmach-business-hub/ --delete || echo "AWS S3 sync skipped - no credentials"
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_DISTRIBUTION_ID }} --paths "/*" || echo "CloudFront invalidation skipped"

  azure-deploy:
    name: Deploy to Azure Storage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            frontend
            docs
          sparse-checkout-cone-mode: false
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true
      - name: Upload to Azure Blob Storage
        run: |
          az storage blob upload-batch \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            -d \$web -s ./docs || echo "Azure upload skipped - no credentials"

  gcp-deploy:
    name: Deploy to Google Cloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            frontend
            docs
          sparse-checkout-cone-mode: false
      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
        continue-on-error: true
      - name: Deploy to Cloud Storage
        run: |
          gsutil -m rsync -d -r ./docs gs://bakhmach-business-hub-docs/ || echo "GCP deploy skipped - no credentials"
          gsutil -m rsync -d -r ./src gs://bakhmach-business-hub-src/ || echo "GCP src sync skipped"

  code-analysis:
    name: Code Quality & Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            frontend
            docs
            README.md
            package.json
          sparse-checkout-cone-mode: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'javascript'
        continue-on-error: true
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
      - name: Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  cloudflare-deploy:
    name: Deploy to Cloudflare Workers & Pages
    runs-on: ubuntu-latest
    needs: [code-analysis]
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            frontend
            docs
            README.md
            package.json
          sparse-checkout-cone-mode: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || echo "npm ci skipped - no package-lock.json"
      - name: Build Workers
        run: npm run build:workers || echo "Build skipped - no build script"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          environment: production
        continue-on-error: true
      - name: Run integration tests
        run: npm run test:integration || echo "Integration tests skipped"
        env:
          API_BASE_URL: https://bbbhhai.com
          TEST_TELEGRAM_TOKEN: ${{ secrets.TEST_TELEGRAM_TOKEN }}
          TEST_GMAIL_TOKEN: ${{ secrets.TEST_GMAIL_TOKEN }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cloudflare
          path: test-results/
        continue-on-error: true
